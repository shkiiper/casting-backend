server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  web:
    resources:
      static-locations: file:/app/uploads/

  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET}
  expirationMs: ${JWT_EXPIRATION_MS:86400000}

payments:
  webhookSecret: ${PAYMENTS_WEBHOOK_SECRET}
  resultRedirectUrl: ${PAYMENTS_RESULT_REDIRECT_URL:https://onsetcasting.com/payment/result}

app:
  publicApiUrl: ${APP_PUBLIC_API_URL}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://onsetcasting.com,https://www.onsetcasting.com,http://localhost:5173}

  upload:
    dir: /app/uploads
    public-path: /uploads

  mail:
    from: ${APP_MAIL_FROM:no-reply@onset.app}

  tokens:
    emailVerificationTtlMinutes: 60
    passwordResetTtlMinutes: 30

logging:
  level:
    com.casting.platform: INFO
    org.springframework.security: INFO
    org.springframework.mail: INFO
    org.apache.catalina.connector.OutputBuffer: ERROR
